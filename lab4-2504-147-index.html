<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书商城</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="icons">
            <div class="icon-item">
                <img src="./img/search-icon.jpg" alt="搜索" class="icon">
            </div>
            <div class="icon-item">
                <img src="./img/cart-icon.jpg" alt="购物车" class="icon">
            </div>
        </div>
        <button class="login-btn">登录</button>
    </nav>

    <div class="carousel">
        <div class="carousel-inner">
            <div class="carousel-item"><img src="./img/banner1.jpg" alt="轮播图1"></div>
            <div class="carousel-item"><img src="./img/banner2.jpg" alt="轮播图2"></div>
            <div class="carousel-item"><img src="./img/banner3.jpg" alt="轮播图3"></div>
        </div>
    </div>

    <div class="hot-books">
        <h2>热门图书</h2>
        <div class="book-list">
            <div class="book-item">
                <img src="./img/book1.jpg" alt="图书1" class="book-img">
                <p>图书名称1</p>
            </div>
            <div class="book-item">
                <img src="./img/book2.jpg" alt="图书2" class="book-img">
                <p>图书名称2</p>
            </div>
        </div>
    </div>
</body>
</html>
